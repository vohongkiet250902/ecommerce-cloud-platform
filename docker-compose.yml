services:
  # 1. Database & Cache Services (Giữ nguyên cấu hình cũ)
  redis_cache:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: ecommerce_meilisearch
    restart: always
    ports:
      - '7700:7700'
    environment:
      - MEILI_MASTER_KEY=EcommerceSearchKey_2026_SecretString
    volumes:
      - meili_data:/meili_data

  # 2. NestJS Backend
  backend:
    build: ./backend
    container_name: ecommerce_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - redis_cache
      - meilisearch
    environment:
      - REDIS_URL=redis://ecommerce_redis:6379
      - MEILI_HOST=http://ecommerce_meilisearch:7700
      - MEILI_API_KEY=EcommerceSearchKey_2026_SecretString

  # 3. Next.js Frontend (PHẦN THÊM MỚI)
  frontend:
    build: ./frontend
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # URL để Frontend gọi API từ phía Browser
      - NEXT_PUBLIC_API_URL=http://localhost:8080 

volumes:
  redis_data:
  meili_data: