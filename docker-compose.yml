services:
  # 1. Redis
  redis_cache:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # 2. NestJS Backend
  backend:
    build: ./backend
    container_name: ecommerce_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - redis_cache
    environment:
      - MONGODB_URI=mongodb+srv://vohongkiet250902_db_user:nGXQ9pr6Apqe0teK@protech.za9nfna.mongodb.net/?appName=ProTech
      - REDIS_URL=redis://ecommerce_redis:6379
      - MEILI_HOST=https://ms-3ead7f71fd9d-41922.sgp.meilisearch.io
      - MEILI_API_KEY=6a9959165fe239d76fcbd0c5455b549477164005

  # 3. Next.js Frontend
  frontend:
    build: ./frontend
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=https://protech.name.vn/api

volumes:
  redis_data:
