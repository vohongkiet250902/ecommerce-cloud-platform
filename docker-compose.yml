services:
  # 1. Redis (Giữ nguyên)
  redis_cache:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # 2. Meilisearch (Giữ nguyên)
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: ecommerce_meilisearch
    restart: always
    ports:
      - '7700:7700'
    environment:
      - MEILI_MASTER_KEY=EcommerceSearchKey_2026_SecretString
    volumes:
      - meili_data:/meili_data

  # 3. THÊM BACKEND VÀO ĐÂY
  backend:
    build: ./backend
    container_name: ecommerce_backend
    restart: always
    ports:
      - '8080:8080' # Port bạn thường dùng cho NestJS [cite: 2026-01-26]
    depends_on:
      - redis_cache
      - meilisearch
    environment:
      - REDIS_HOST=ecommerce_redis
      - REDIS_PORT=6379
      - MEILI_HOST=http://meilisearch:7700
      # Thêm các biến MongoDB nếu bạn đã có DB rời hoặc thêm service mongo vào đây

volumes:
  redis_data:
  meili_data:
